<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" fill="none">
  <!-- Icon container: orange-tinted rounded square -->
  <rect x="0" y="4" width="60" height="60" rx="14" fill="#f97316" fill-opacity="0.12"/>
  <rect x="0.5" y="4.5" width="59" height="59" rx="13.5" stroke="#f97316" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Lucide Braces icon, scaled to ~32×32 and centered in 60×60 box -->
  <!-- Original paths are 24×24; scale=1.75, translate to center at (30,34) -->
  <g transform="translate(9, 13) scale(1.75)">
    <path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1"
          stroke="#fb923c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M16 21h1a2 2 0 0 0 2-2v-5c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"
          stroke="#fb923c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Phosphor-green pulse dot (live / active) -->
  <circle cx="52" cy="12" r="5.5" fill="#060a14"/>
  <circle cx="52" cy="12" r="4" fill="#39ff14"/>
  <circle cx="52" cy="12" r="4" fill="#39ff14" opacity="0.4">
    <animate attributeName="r" from="4" to="8" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Wordmark -->
  <text x="74" y="37"
        font-family="'Space Grotesk', 'Segoe UI', sans-serif"
        font-size="24" font-weight="600" fill="white" letter-spacing="-0.4">OfficePlane</text>

  <!-- Tagline -->
  <text x="75" y="55"
        font-family="'IBM Plex Sans', sans-serif"
        font-size="11" fill="#94a3b8" letter-spacing="0.6">Agentic Runtime</text>
</svg>
