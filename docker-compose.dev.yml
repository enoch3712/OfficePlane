services:
  # PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: officeplane-db
    environment:
      POSTGRES_DB: officeplane
      POSTGRES_USER: officeplane
      POSTGRES_PASSWORD: officeplane
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U officeplane"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend (Development with hot-reload)
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: officeplane-api
    ports:
      - "8001:8001"
    environment:
      - OFFICEPLANE_DRIVER=mock
      - DATABASE_URL=postgresql://officeplane:officeplane@db:5432/officeplane
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data
      # Mount source code for hot-reload
      - ./src/officeplane:/app/src/officeplane
    command: uvicorn officeplane.api.main:app --host 0.0.0.0 --port 8001 --reload

  # NextJS UI (Development with hot-reload)
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile.dev
    container_name: officeplane-ui
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://officeplane:officeplane@db:5432/officeplane
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      # Mount source code for hot-reload
      - ./ui:/app/ui
      - ./prisma:/app/prisma
      # Exclude node_modules from mounting (use container's version)
      - /app/node_modules
      - /app/ui/node_modules
      # Exclude .next build directory
      - /app/ui/.next

volumes:
  db_data:
